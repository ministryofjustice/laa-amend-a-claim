name: 'Fetch IP Allowlist'
description: 'Fetches LAA IP allowlist CIDRs for external staff access'
inputs:
  include_pingdom:
    description: 'Whether to include Pingdom probe IPs in the allowlist'
    required: false
    default: 'false'
outputs:
  cidrs:
    description: 'Comma-separated CIDRs in Helm array format: {cidr1,cidr2,...}'
    value: ${{ steps.fetch.outputs.cidrs }}

runs:
  using: 'composite'
  steps:
    - name: Fetch and Filter IP Allowlist
      id: fetch
      shell: bash
      env:
        INCLUDE_PINGDOM: ${{ inputs.include_pingdom }}
      run: |
        # Download the CIDR filter script and data file
        curl -sO https://raw.githubusercontent.com/ministryofjustice/laa-ip-allowlist/CC-4327/filter_cidrs.py
        curl -sO https://raw.githubusercontent.com/ministryofjustice/laa-ip-allowlist/CC-4327/laa-cidrs.yaml

        # Filter CIDRs for external staff access (MoJ VPN/egress IPs)
        CIDRS=$(python3 filter_cidrs.py --group external staff | tr '\n' ',' | sed 's/,$//')

        # Optionally include Pingdom probe IPs
        if [[ "${INCLUDE_PINGDOM}" == "true" ]]; then
          PINGDOM_CIDRS=$(curl -s https://my.pingdom.com/probes/ipv4 | tr -d ' ' | sed 's/$/\/32/' | tr '\n' ',' | sed 's/,$//')
          CIDRS="${CIDRS},${PINGDOM_CIDRS}"
        fi

        # Wrap in braces for Helm array syntax
        CIDRS_ARRAY="{${CIDRS}}"

        echo "cidrs=${CIDRS_ARRAY}" >> $GITHUB_OUTPUT
        echo "CIDR count: $(echo "${CIDRS}" | tr ',' '\n' | wc -l | xargs)"

        rm -f filter_cidrs.py laa-cidrs.yaml
