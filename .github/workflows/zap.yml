name: ZAP
on:
  schedule:
    - cron: "0 0 * * *" # Daily at midnight
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run the workflow on (default: main)'
        required: false
        default: 'main'
jobs:
  zap_scan:
    name: Scan the web application
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      SPRING_PROFILES_ACTIVE: local
      CLAIMS_API: http://localhost:8081
      PROVIDER_API: http://localhost:8081
      SENTRY_ENVIRONMENT: local
      REDIS_URL: redis://localhost:6379
      FEEDBACK_URL: /
      LAA_URL: /
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.branch || 'main' }}
      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 25
          distribution: corretto
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1
      - name: Start app with local profile
        run: |
          echo "INFO: Running application..."
          docker compose up -d wiremock redis
          ./gradlew bootRun > zap_output.log 2>&1 &

          url="http://localhost:8182/actuator/health"
          retries=30

          for i in $(seq 1 $retries); do
            echo "INFO: Checking application health (attempt $i of $retries)..."
            if curl -sf "$url" | grep -q '"status":"UP"'; then
              echo "INFO: Application is healthy";
              exit 0;
            fi
            sleep 2
          done

          echo "ERROR: Application did not start"           
          exit 1
      - name: ZAP Scan
        uses: zaproxy/action-full-scan@3c58388149901b9a03b7718852c5ba889646c27c # v0.13.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://localhost:8080/?officeCode=0P322F' # Exposes 'View' links for ZAP spider to discover
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-z "-config spider.maxDepth=10" -n zap.context' # https://www.zaproxy.org/docs/docker/full-scan/#usage
          allow_issue_writing: false
          fail_action: true
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: zap_output.log
          path: zap_output.log
          retention-days: 1
      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: >
              :x: ZAP job failed!
              Download the zap_scan report. Use zap_output.log for help debugging if needed. The artifacts are available here:
              https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
