name: Feature Branch Pipeline

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write
  pull-requests: write

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml
    with:
      branch: ${{ github.ref_name }}
    secrets: inherit

  pact-test:
    name: Pact Test
    needs: build
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/pact-and-publish.yml@68d8f5aeccd47fa5baa1fe6c63269569b682e656 # v2.0.0
    permissions:
      contents: write
      packages: write
    with:
      pacticipant_name: "laa-amend-a-claim"
      pact_test_task: "pactTest"
      publish_pact_results: true
      enable_can_i_merge: true
      provider_name: "laa-data-claims-api"
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
      pact_broker_url: 'https://laa-data-pact-broker.apps.live.cloud-platform.service.justice.gov.uk/'
      pact_broker_username: ${{ secrets.PACT_BROKER_USERNAME }}
      pact_broker_password: ${{ secrets.PACT_BROKER_PASSWORD }}

  deploy-ephemeral:
    name: Deploy Ephemeral Environment
    needs: build
    uses: ./.github/workflows/deploy-ephemeral.yml
    with:
      branch: ${{ github.ref_name }}
      image_tag: ${{ needs.build.outputs.image_tag }}
      aws_region: ${{ vars.ECR_REGION }}
    secrets: inherit

  test:
    name: Test
    needs: [ build, deploy-ephemeral ]
    uses: ./.github/workflows/test.yml
    with:
      branch: ${{ github.ref_name }}
      environment: dev
      amend_a_claim_image_tag: ${{ needs.build.outputs.image_tag }}
      sanitized_release_name: ${{ needs.deploy-ephemeral.outputs.sanitized_release_name }}
    secrets: inherit

  security:
    name: Security
    needs: build
    uses: ./.github/workflows/security.yml
    with:
      branch: ${{ github.ref_name }}
      image_tag: ${{ needs.build.outputs.image_tag }}
      aws_region: ${{ vars.ECR_REGION }}
    secrets: inherit

  deploy-dev:
    name: Deploy to Dev
    needs: [ build, test, pact-test ]
    uses: ./.github/workflows/deploy.yml
    with:
      branch: ${{ github.ref_name }}
      environment: dev
      sentry_env: development
      image_tag: ${{ needs.build.outputs.image_tag }}
      aws_region: ${{ vars.ECR_REGION }}
      values_file: values/dev.yaml
      claim_api_environment_name: dev
    secrets: inherit
