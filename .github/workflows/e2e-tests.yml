name: E2E Tests with Self-Hosted Runner

on:
  workflow_call:
    inputs:
      branch:
        required: false
        type: string
        default: 'main'
      environment:
        required: true
        type: string
    secrets:
      ECR_ROLE_TO_ASSUME:
        required: true
#      DATA_CLAIMS_API_IMAGE:
#        required: true
      KUBE_NAMESPACE:
        required: true
      KUBE_CLUSTER:
        required: true
      KUBE_TOKEN:
        required: true
      KUBE_CERT:
        required: true

permissions:
  id-token: write
  contents: read
  actions: write  # Required to get runner registration token

jobs:
  build-runner-image:
    name: Build E2E Runner Image
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      image_tag: ${{ steps.get_sha.outputs.sha }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Get commit SHA
        id: get_sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Authenticate to ECR
        id: ecr-auth
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/ecr-auth@main
        with:
          ecr_region: ${{ vars.ECR_REGION }}
          ecr_role: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          role-session-name: ${{ github.run_id }}-e2e-build

      - name: Build and Push Runner Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.e2e-runner
          push: true
          tags: |
            ${{ steps.ecr-auth.outputs.image_registry }}/${{ vars.ECR_REPOSITORY }}:github-e2e-runner

  deploy-e2e-environment:
    name: Deploy E2E Environment with Runner
    needs: build-runner-image
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Authenticate to ECR
        id: ecr-auth
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/ecr-auth@main
        with:
          ecr_region: ${{ vars.ECR_REGION }}
          ecr_role: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          role-session-name: ${{ github.run_id }}-e2e-deploy

      - name: Authenticate to Kubernetes
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/authenticate_to_cluster@main
        with:
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          kube-sa: deploy-user

      - name: Get Runner Registration Token from GitHub
        id: runner-token
        run: |
          RUNNER_TOKEN=$(curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/runners/registration-token | jq -r .token)
          
          echo "::add-mask::$RUNNER_TOKEN"
          echo "token=$RUNNER_TOKEN" >> $GITHUB_OUTPUT

      - name: Create GitHub Runner Token Secret
        run: |
          kubectl create secret generic github-runner-token \
            --from-literal=token=${{ steps.runner-token.outputs.token }} \
            --namespace ${{ inputs.namespace }} \
            --dry-run=client -o yaml | kubectl apply -f -

