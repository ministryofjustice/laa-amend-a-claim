name: Security

on:
  workflow_call:
    inputs:
      branch:
        required: false
        type: string
        default: 'main'
      image_tag:
        required: true
        type: string
        description: "The Docker image tag to scan"
      aws_region:
        required: false
        type: string
        default: 'eu-west-2'
        description: 'AWS region for the ECR'

permissions:
  contents: read
  security-events: write
  id-token: write

jobs:
  vulnerability-scan-docker:
    name: Vulnerability Scan - Docker
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      security-events: write
      id-token: write
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.branch }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ inputs.aws_region }}

      - name: Authenticate to Amazon ECR
        uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7 # v2.1.4
        id: login-ecr

      - name: Pull Docker image from ECR
        run: |
          docker pull $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker tag $REGISTRY/$REPOSITORY:$IMAGE_TAG spring-boot-microservice:scan
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ inputs.image_tag }}

      - name: Run Snyk on Docker image
        uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04
        with:
          image: spring-boot-microservice:scan
          args: --file=Dockerfile --severity-threshold=high --policy-path=.snyk