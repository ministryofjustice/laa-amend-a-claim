name: Security

on:
  workflow_call:
    inputs:
      branch:
        required: false
        type: string
        default: 'main'
      image_tag:
        required: true
        type: string
        description: "The Docker image tag to scan"
      aws_region:
        required: false
        type: string
        default: 'eu-west-2'
        description: 'AWS region for the ECR'
    secrets:
      ECR_ROLE_TO_ASSUME:
        required: true
      SNYK_CLIENT_ID:
        required: true
      SNYK_CLIENT_SECRET:
        required: true

permissions:
  contents: read
  security-events: write
  id-token: write

jobs:
  vulnerability-scan-docker:
    name: Vulnerability Scan - Docker
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      security-events: write
      id-token: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.branch }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ inputs.aws_region }}

      - name: Authenticate to Amazon ECR
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6
        id: login-ecr

      - name: Pull Docker image from ECR
        run: |
          docker pull $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker tag $REGISTRY/$REPOSITORY:$IMAGE_TAG spring-boot-microservice:scan
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ inputs.image_tag }}

      - name: Obtain Short-lived Snyk token
        id: auth
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/snyk-auth@6db001458db30ae747d9eb8eb25707ce52b359bc
        with:
          client_id: ${{ secrets.SNYK_CLIENT_ID }}
          client_secret: ${{ secrets.SNYK_CLIENT_SECRET }}

      - name: Run Snyk on Docker image
        env:
          SNYK_OAUTH_TOKEN: ${{ steps.auth.outputs.token }}
        uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04
        with:
          image: spring-boot-microservice:scan
          args: --file=Dockerfile --severity-threshold=high --policy-path=.snyk