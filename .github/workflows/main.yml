name: Main Branch Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml
    with:
      branch: ${{ github.ref_name }}

  test:
    name: Test
    needs: build
    uses: ./.github/workflows/test.yml
    with:
      branch: ${{ github.ref_name }}
      environment: dev
      amend_a_claim_image_tag: ${{ needs.build.outputs.image_tag }}
      sanitized_release_name: 'main'

  pact-test:
    name: Pact Test
    needs: build
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/pact-and-publish.yml@a5b870c152d0bc4a7f67a23f2c226868f94d7041 # v2.2.2
    permissions:
      contents: write
      packages: write
    with:
      pacticipant_name: "laa-amend-a-claim"
      java_version: '25'
      java_distribution: 'corretto'
      pact_test_task: "pactTest"
      publish_pact_results: true
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
      pact_broker_url: 'https://laa-data-pact-broker.apps.live.cloud-platform.service.justice.gov.uk/'
      pact_broker_username: ${{ secrets.PACT_BROKER_USERNAME }}
      pact_broker_password: ${{ secrets.PACT_BROKER_PASSWORD }}

  security:
    name: Security
    needs: build
    uses: ./.github/workflows/snyk-docker-scan.yml
    with:
      branch: ${{ github.ref_name }}
      image_tag: ${{ needs.build.outputs.image_tag }}
      aws_region: ${{ vars.ECR_REGION }}

  deploy-dev:
    name: Deploy to Dev
    needs: [ build, test, security, pact-test ]
    uses: ./.github/workflows/deploy.yml
    with:
      branch: ${{ github.ref_name }}
      environment: dev
      sentry_env: development
      image_tag: ${{ needs.build.outputs.image_tag }}
      aws_region: ${{ vars.ECR_REGION }}
      values_file: values/dev.yaml
      claim_api_environment_name: dev

  deploy-uat:
    name: Deploy to UAT
    needs: [ build, test, security, pact-test, deploy-dev ]
    uses: ./.github/workflows/deploy.yml
    with:
      branch: ${{ github.ref_name }}
      environment: test
      sentry_env: test
      image_tag: ${{ needs.build.outputs.image_tag }}
      aws_region: ${{ vars.ECR_REGION }}
      values_file: values/uat.yaml
      claim_api_environment_name: main

  deploy-staging:
    name: Deploy to Staging
    needs: [ build, test, security, pact-test, deploy-uat ]
    uses: ./.github/workflows/deploy.yml
    with:
      branch: ${{ github.ref_name }}
      environment: staging
      sentry_env: staging
      image_tag: ${{ needs.build.outputs.image_tag }}
      aws_region: ${{ vars.ECR_REGION }}
      values_file: values/staging.yaml
      claim_api_environment_name: stg

  deploy-production:
    name: Deploy to Production
    needs: [ build, test, security, pact-test, deploy-uat, deploy-staging ]
    uses: ./.github/workflows/deploy.yml
    with:
      branch: ${{ github.ref_name }}
      environment: production
      sentry_env: production
      image_tag: ${{ needs.build.outputs.image_tag }}
      aws_region: ${{ vars.ECR_REGION }}
      values_file: values/production.yaml
      claim_api_environment_name: prod
