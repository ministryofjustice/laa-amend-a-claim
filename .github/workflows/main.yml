name: Main Branch Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml
    with:
      branch: ${{ github.ref_name }}
    secrets:
      ECR_ROLE_TO_ASSUME: ${{ secrets.ECR_ROLE_TO_ASSUME }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  test:
    name: Test
    needs: build
    uses: ./.github/workflows/test.yml
    with:
      branch: ${{ github.ref_name }}
      environment: dev
      amend_a_claim_image_tag: ${{ needs.build.outputs.image_tag }}
      sanitized_release_name: 'main'
    secrets:
      P_USERNAME: ${{ secrets.P_USERNAME }}
      P_PASSWORD: ${{ secrets.P_PASSWORD }}
      P_MFA_SECRET: ${{ secrets.P_MFA_SECRET }}
      E2E_DB_PASSWORD: ${{ secrets.E2E_DB_PASSWORD }}
      E2E_DB_USER: ${{ secrets.E2E_DB_USER }}
      KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
      KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
      KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
      KUBE_CERT: ${{ secrets.KUBE_CERT }}
      ECR_ROLE_TO_ASSUME: ${{ secrets.ECR_ROLE_TO_ASSUME }}
      DATA_CLAIMS_API_IMAGE: ${{ secrets.DATA_CLAIMS_API_IMAGE }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  pact-test:
    name: Pact Test
    needs: build
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/pact-and-publish.yml@90aa22bf1f55a39b4f10c4f7168356f0669eed77 # v1
    permissions:
      contents: write
      packages: write
    with:
      pacticipant_name: "laa-amend-a-claim"
      pact_test_task: "pactTest"
      publish_pact_results: true
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
      pact_broker_url: 'https://laa-data-pact-broker.apps.live.cloud-platform.service.justice.gov.uk/'
      pact_broker_username: ${{ secrets.PACT_BROKER_USERNAME }}
      pact_broker_password: ${{ secrets.PACT_BROKER_PASSWORD }}

  security:
    name: Security
    needs: [ build, test ]
    uses: ./.github/workflows/security.yml
    with:
      branch: ${{ github.ref_name }}
      image_tag: ${{ needs.build.outputs.image_tag }}
      aws_region: ${{ vars.ECR_REGION }}
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      ECR_ROLE_TO_ASSUME: ${{ secrets.ECR_ROLE_TO_ASSUME }}

  deploy-dev:
    name: Deploy to Dev
    needs: [ build, test, security, pact-test ]
    uses: ./.github/workflows/deploy.yml
    with:
      branch: ${{ github.ref_name }}
      environment: dev
      sentry_env: development
      image_tag: ${{ needs.build.outputs.image_tag }}
      aws_region: ${{ vars.ECR_REGION }}
      values_file: values/dev.yaml
      claim_api_environment_name: dev
    secrets:
      ECR_ROLE_TO_ASSUME: ${{ secrets.ECR_ROLE_TO_ASSUME }}
      KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
      KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
      KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
      KUBE_CERT: ${{ secrets.KUBE_CERT }}
      PACT_BROKER_USERNAME: ${{ secrets.PACT_BROKER_USERNAME }}
      PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}

  deploy-uat:
    name: Deploy to UAT
    needs: [ build, test, security, pact-test, deploy-dev ]
    uses: ./.github/workflows/deploy.yml
    with:
      branch: ${{ github.ref_name }}
      environment: test
      sentry_env: test
      image_tag: ${{ needs.build.outputs.image_tag }}
      aws_region: ${{ vars.ECR_REGION }}
      values_file: values/uat.yaml
      claim_api_environment_name: main
    secrets:
      ECR_ROLE_TO_ASSUME: ${{ secrets.ECR_ROLE_TO_ASSUME }}
      KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
      KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
      KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
      KUBE_CERT: ${{ secrets.KUBE_CERT }}
      PACT_BROKER_USERNAME: ${{ secrets.PACT_BROKER_USERNAME }}
      PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}

  deploy-staging:
    name: Deploy to Staging
    needs: [ build, test, security, pact-test, deploy-uat ]
    uses: ./.github/workflows/deploy.yml
    with:
      branch: ${{ github.ref_name }}
      environment: staging
      sentry_env: staging
      image_tag: ${{ needs.build.outputs.image_tag }}
      aws_region: ${{ vars.ECR_REGION }}
      values_file: values/staging.yaml
      claim_api_environment_name: stg
    secrets:
      ECR_ROLE_TO_ASSUME: ${{ secrets.ECR_ROLE_TO_ASSUME }}
      KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
      KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
      KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
      KUBE_CERT: ${{ secrets.KUBE_CERT }}
      PACT_BROKER_USERNAME: ${{ secrets.PACT_BROKER_USERNAME }}
      PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}

  deploy-production:
    name: Deploy to Production
    needs: [ build, test, security, pact-test, deploy-uat, deploy-staging ]
    uses: ./.github/workflows/deploy.yml
    with:
      branch: ${{ github.ref_name }}
      environment: production
      sentry_env: production
      image_tag: ${{ needs.build.outputs.image_tag }}
      aws_region: ${{ vars.ECR_REGION }}
      values_file: values/production.yaml
      claim_api_environment_name: prod
    secrets:
      ECR_ROLE_TO_ASSUME: ${{ secrets.ECR_ROLE_TO_ASSUME }}
      KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
      KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
      KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
      KUBE_CERT: ${{ secrets.KUBE_CERT }}
      PACT_BROKER_USERNAME: ${{ secrets.PACT_BROKER_USERNAME }}
      PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}