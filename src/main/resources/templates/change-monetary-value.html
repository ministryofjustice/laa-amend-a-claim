<!DOCTYPE html>
<th:block th:with="prefix=${cost.prefix}, title=${#strings.concat(prefix, '.title')}">
    <html lang="en"
        xmlns:th="http://www.thymeleaf.org"
        th:replace="~{layout :: layout(
            title=#{${title}},
            mainContent=~{::#main-content},
            pageCategory=${null},
            showBackLink=${false}
    )}">
        <body>
            <main class="govuk-main-wrapper" id="main-content">
                <div class="govuk-grid-row">
                    <div class="govuk-grid-column-two-thirds">
                        <form th:action="@{${action}}" th:object="${form}" method="post">

                            <th:block th:with="formErrors=${@ThymeleafUtils.toMonetaryFormValueErrors(#fields.detailedErrors())}">
                                <th:block th:replace="~{partials/error-summary :: error-summary(${formErrors})}"></th:block>
                            </th:block>

                            <h1 class="govuk-heading-xl" th:with="heading=${#strings.concat(prefix, '.heading')}" th:text="#{${heading}}"></h1>

                            <dl class="govuk-summary-list">
                                <div class="govuk-summary-list__row">
                                    <dt class="govuk-summary-list__key" th:text="#{changeMonetaryValue.calculated}"></dt>
                                    <dd class="govuk-summary-list__value" th:text="${@ThymeleafUtils.getFormattedValue(claimFieldRow.calculated).resolve(#messages)}"></dd>
                                </div>
                                <div class="govuk-summary-list__row">
                                    <dt class="govuk-summary-list__key" th:text="#{changeMonetaryValue.submitted}"></dt>
                                    <dd class="govuk-summary-list__value" th:text="${@ThymeleafUtils.getFormattedValue(claimFieldRow.submitted).resolve(#messages)}"></dd>
                                </div>
                            </dl>

                            <div class="govuk-form-group">
                                <label class="govuk-label govuk-label--s" for="value" th:text="#{changeMonetaryValue.assessed}"></label>

                                <th:block th:if="${#messages.msgOrNull(prefix + '.hint') != null}">
                                    <div th:with="hint=${#strings.concat(prefix, '.hint')}" id="value-hint" class="govuk-hint" th:text="#{${hint}}"></div>
                                </th:block>

                                <p th:if="${#fields.hasErrors('value')}" class="govuk-error-message">
                                    <span class="govuk-visually-hidden" th:text="#{form.error}"></span>
                                    <th:block th:errors=" *{value}"></th:block>
                                </p>

                                <div class="govuk-input__wrapper">
                                    <div class="govuk-input__prefix" aria-hidden="true">£</div>

                                    <input class="govuk-input govuk-input--width-5"
                                           th:classappend="${#fields.hasErrors('value') ? 'govuk-input--error' : ''}"
                                           id="value"
                                           name="value"
                                           type="text"
                                           spellcheck="false"
                                           th:field="*{value}">
                                </div>
                            </div>

                            <div class="govuk-button-group">
                                <button type="submit" class="govuk-button" data-module="govuk-button" th:text="#{service.saveChanges}"></button>

                                <a th:href="@{${redirectUrl}}" th:text="#{service.cancel}" class="govuk-link govuk-link--no-visited-state"></a>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </body>
    </html>
</th:block>
