<th:block th:fragment="claimDetailsHeader(currentPage)" xmlns:th="http://www.thymeleaf.org">
    <!--/*@thymesVar id="featureFlagsConfig" type="uk.gov.justice.laa.amend.claim.config.FeatureFlagsConfig"*/-->
    <!--/*@thymesVar id="claimDetailsHeaderView" type="uk.gov.justice.laa.amend.claim.viewmodels.ClaimDetailsHeaderView"*/-->

    <th:block th:if="${claimDetailsHeaderView.isLastAssessedAlertPresent}">
        <th:block th:replace="~{partials/information-alert :: informationAlert('claimSummary', ${claimDetailsHeaderView.lastEditedBy.resolve(#messages)})}"></th:block>
    </th:block>

    <th:block th:if="${claimDetailsHeaderView.isVoidedAlertPresent}">
        <th:block th:replace="~{partials/error-alert :: errorAlert('claimSummary.error', ${claimDetailsHeaderView.lastEditedBy.resolve(#messages)})}"></th:block>
    </th:block>

    <h1 class="govuk-heading-l">
        <span th:text="#{claimDetails.mainHeading}"></span>
    </h1>

    <nav class="moj-sub-navigation" aria-label="Sub navigation">
        <ul class="moj-sub-navigation__list">
            <li class="moj-sub-navigation__item">
                <a class="moj-sub-navigation__link"
                   th:attr="aria-current=${currentPage == 'overview'} ? 'page' : null"
                   th:href="@{/submissions/{submissionId}/claims/{claimId}(submissionId=${submissionId}, claimId=${claimId})}"
                   th:text="#{claimDetails.overviewHeading}"></a>
            </li>
            <li class="moj-sub-navigation__item">
                <a class="moj-sub-navigation__link"
                   th:attr="aria-current=${currentPage == 'history'} ? 'page' : null"
                   th:href="@{/submissions/{submissionId}/claims/{claimId}/history(submissionId=${submissionId}, claimId=${claimId})}"
                   th:text="#{claimDetails.claimHistoryHeading}"></a>
            </li>
        </ul>
    </nav>
</th:block>
