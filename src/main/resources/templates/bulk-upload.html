<!DOCTYPE html >
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(
        title=#{bulkUpload.title},
        mainContent=~{::#main-content},
        pageCategory='bulk-upload',
        showBackLink=${false}
    )}">
    <body>
        <main class="govuk-main-wrapper" id="main-content">
            <div class="govuk-grid-row">
                <div class="govuk-grid-column-two-thirds">
                    <h1 class="govuk-heading-xl">
                        <span th:text="#{bulkUpload.heading}"></span>
                    </h1>
                    <div class="govuk-body" th:text="#{bulkUpload.description}"></div>

                    <details class="govuk-details">
                        <summary class="govuk-details__summary">
                            <span class="govuk-details__summary-text" th:text="#{bulkUpload.csvFormat.summary}"></span>
                        </summary>
                        <div class="govuk-details__text">
                            <p class="govuk-body" th:text="#{bulkUpload.csvFormat.leadInLine}"></p>
                            <ul class="govuk-list govuk-list--bullet govuk-list--spaced">
                                <li th:text="#{bulkUpload.csvFormat.officeCodeColumn}"></li>
                                <li th:text="#{bulkUpload.csvFormat.ufnColumn}"></li>
                                <li th:text="#{bulkUpload.csvFormat.assessmentOutcomeColumn}"></li>
                                <li th:text="#{bulkUpload.csvFormat.profitCostColumn}"></li>
                                <li th:text="#{bulkUpload.csvFormat.disbursementsColumn}"></li>
                                <li th:text="#{bulkUpload.csvFormat.disbursementsVatColumn}"></li>
                                <li th:text="#{bulkUpload.csvFormat.counselCostsColumn}"></li>
                                <li th:text="#{bulkUpload.csvFormat.totalAllowedVatColumn}"></li>
                                <li th:text="#{bulkUpload.csvFormat.totalAllowedIncludingVatColumn}"></li>
                                <li th:text="#{bulkUpload.csvFormat.uniqueOfficeCodeAndUfn}"></li>
                                <li th:text="#{bulkUpload.csvFormat.monetaryValues}"></li>
                            </ul>
                            <a th:href="@{/bulk-upload/example}"
                               th:text="#{bulkUpload.csvFormat.exampleLink}"
                               class="govuk-link govuk-link--no-visited-state"
                               id="bulk-upload-example-link">
                            </a>
                        </div>
                    </details>

                    <form id="bulk-upload-form" th:action="@{/bulk-upload}" enctype="multipart/form-data" method="post">
                        <div class="govuk-form-group"
                                th:classappend="${fileError != null}? 'govuk-form-group--error'">

                            <label class="govuk-label govuk-label--l" for="file-upload" th:text="#{bulkUpload.fileLabel}"></label>
                            <div class="govuk-hint" th:text="#{bulkUpload.fileHint}"></div>
                            <p th:if="${fileError}" class="govuk-error-message" id="file-upload-error">
                                <span class="govuk-visually-hidden" th:text="#{form.error}"></span>
                                <span th:text="${fileError.resolve(#messages)}"></span>
                            </p>
                            <div class="govuk-drop-zone" data-module="govuk-file-upload" id="drop-zone">
                                <input class="govuk-file-upload"
                                       th:classappend="${fileError}? 'govuk-file-upload--error'"
                                       id="file-upload"
                                       name="file"
                                       type="file"
                                       aria-describedby="file-upload-error"
                                >
                            </div>
                        </div>

                        <div class="loading-wrapper" id="loading-wrapper">
                            <div class="loading-spinner"></div>
                            <h2 class="govuk-heading-m govuk-!-text-align-centre govuk-!-padding-top-4" th:text="#{bulkUpload.uploading}"></h2>
                        </div>

                        <div class="govuk-button-group">
                            <button class="govuk-button"
                                    id="bulk-upload-button"
                                    type="submit"
                                    data-module="govuk-button"
                                    th:text="#{bulkUpload.uploadButton}">
                            </button>
                            <a th:href="@{/}" id="back-to-search"
                               class="govuk-link govuk-link--no-visited-state"
                               th:text="#{bulkUpload.backToSearch}">
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </body>
</html>
