  labels:
    {{- include "data-claims-api.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['e2e-data-claims-api:{{ .Values.dataClaimsApi.service.port }}']
  restartPolicy: Never
