plugins {
    id 'uk.gov.laa.springboot.laa-spring-boot-gradle-plugin' version '2.2.3'
    id "com.diffplug.spotless" version "8.4.0"
    id "com.palantir.java-format-spotless" version "2.90.0"
    id "io.sentry.jvm.gradle" version "6.4.0"
    id 'au.com.dius.pact' version '4.6.20'
}

java {
    sourceCompatibility = JavaVersion.VERSION_25
    targetCompatibility = JavaVersion.VERSION_25
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

checkstyle {
    toolVersion = '13.3.0'
    configFile = file("${rootDir}/config/checkstyle/checkstyle.xml")
}

spotless {
    java {
        importOrder()
        removeUnusedImports()
    }
}

repositories {
    mavenCentral()
}

configurations.configureEach {
    resolutionStrategy.eachDependency { DependencyResolveDetails details ->
        if (details.requested.group == 'io.netty' && details.requested.name == 'netty-codec-http') {
            details.useVersion '4.2.12.Final'
            details.because 'Fixes HTTP Request Smuggling vulnerability (SNYK-JAVA-IONETTY-15789756)'
        }
    }
}

dependencies {

    // Upgrade to fix SNYK-JAVA-TOOLSJACKSONCORE-15907550
    implementation 'tools.jackson.core:jackson-core:3.1.2'
    implementation 'tools.jackson.core:jackson-databind:3.1.2'

    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'io.micrometer:micrometer-registry-prometheus'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-webmvc'
    implementation 'org.springframework.boot:spring-boot-starter-thymeleaf'
    implementation 'org.springframework.boot:spring-boot-starter-data-redis'
    implementation 'org.springframework.session:spring-session-data-redis'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.thymeleaf.extras:thymeleaf-extras-springsecurity6:3.1.4.RELEASE'
    implementation 'org.springframework.boot:spring-boot-starter-security-oauth2-client'
    implementation 'org.springframework.boot:spring-boot-starter-security-oauth2-resource-server'
    implementation 'org.springframework.boot:spring-boot-starter-jackson'

    // API models
    implementation 'uk.gov.justice.laa.datastewardship.payments:data-claims-api-models:1.0.17'
    implementation 'uk.gov.justice.laadata.providers:providers-api:1.23.0'

    implementation 'org.apache.commons:commons-lang3:3.20.0'
    implementation 'org.mapstruct:mapstruct:1.6.3'

    implementation 'org.springframework.boot:spring-boot-starter-webflux'

    implementation 'org.webjars.npm:govuk-frontend:6.1.0'
    implementation 'org.webjars.npm:ministryofjustice__frontend:9.0.0'
    implementation("org.apache.commons:commons-csv:1.14.1")

    implementation("io.vavr:vavr:1.0.1")

    // Sentry observability for Spring Boot 4
    implementation enforcedPlatform('io.sentry:sentry-bom:8.38.0')
    implementation 'io.sentry:sentry-spring-boot-4'

    compileOnly 'org.projectlombok:lombok'

    annotationProcessor 'org.projectlombok:lombok'
    annotationProcessor 'org.mapstruct:mapstruct-processor:1.6.3'

    // Required for tracing information
    implementation 'org.springframework.boot:spring-boot-micrometer-tracing-brave'
    implementation 'io.micrometer:micrometer-tracing-bridge-brave'

    // Pact consumer testing
    testImplementation 'au.com.dius.pact.consumer:junit5:4.6.20'
    // test dependencies
    testImplementation 'org.springframework.cloud:spring-cloud-contract-wiremock:5.0.2'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.boot:spring-boot-starter-jackson-test'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    developmentOnly 'org.springframework.boot:spring-boot-devtools'
    testImplementation 'org.assertj:assertj-core:3.27.7'
    testImplementation 'org.springframework.boot:spring-boot-testcontainers'
    testImplementation 'org.jmockit:jmockit:1.50'
    testImplementation 'org.springframework.boot:spring-boot-starter-security-test'
    testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
    testImplementation 'org.jsoup:jsoup:1.22.1'
    testImplementation 'com.github.codemonstur:embedded-redis:1.4.3'
}

test {
    useJUnitPlatform()
    finalizedBy jacocoTestReport
}

// Skip e2e tasks during regular build/test
gradle.taskGraph.whenReady { graph ->
    if (graph.hasTask(':build') || graph.hasTask(':test')) {
        graph.allTasks.each { task ->
            if (task.path.contains(':e2e:')) {
                task.enabled = false
            }
        }
    }
}

tasks.register('checkstyleAll') {
    group = 'verification'
    description = 'Runs checkstyleMain, checkstyleTest, and checkstyleIntegrationTest.'
    dependsOn tasks.matching { it.name in ['checkstyleMain', 'checkstyleTest', 'checkstyleIntegrationTest'] }
}

tasks.named('build') {
    dependsOn tasks.named('checkstyleAll')
}

// Pact consumer test source set
sourceSets {
    pactTest {
        java.srcDir file('src/pactTest/java')
        resources.srcDir file('src/pactTest/resources')
        compileClasspath += sourceSets.main.output + configurations.testRuntimeClasspath
        runtimeClasspath += sourceSets.main.output + configurations.testRuntimeClasspath
    }
}

configurations {
    pactTestImplementation.extendsFrom testImplementation
    pactTestRuntimeOnly.extendsFrom testRuntimeOnly
}

tasks.register('pactTest', Test) {
    systemProperty "pact.content_type.override.application/json", "application/json;charset=utf-8"
    description = 'Runs the pact tests.'
    group = 'verification'

    def pactsDir = layout.buildDirectory.dir("pacts").get().asFile
    doFirst {
        if (pactsDir.exists()) {
            pactsDir.deleteDir()
        }
    }

    testClassesDirs = sourceSets.pactTest.output.classesDirs
    classpath = sourceSets.pactTest.runtimeClasspath
    useJUnitPlatform()
    systemProperty 'pact.rootDir', layout.buildDirectory.dir("pacts").get().asFile.path
}

tasks.named('processPactTestResources') {
    duplicatesStrategy = DuplicatesStrategy.INCLUDE
}

pact {
    publish {
        pactBrokerUrl = System.getenv('PACT_BROKER_URL') ?: 'https://laa-data-pact-broker.apps.live.cloud-platform.service.justice.gov.uk/'
        pactBrokerUsername = System.getenv('PACT_BROKER_USERNAME') ?: 'ABC'
        pactBrokerPassword = System.getenv('PACT_BROKER_PASSWORD') ?: 'ABC'
        pactDirectory = layout.buildDirectory.dir("pacts").get().asFile.path
        consumerVersion = providers.environmentVariable('GIT_SHA').getOrElse('1.0.0')
        consumerBranch = providers.environmentVariable('GIT_BRANCH').getOrElse('main')
        tags = [providers.environmentVariable('GIT_BRANCH').getOrElse('main')]
    }
}
